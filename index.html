
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Currency converter</title>
</head>
<body>
    <div class="container">
        <h1>Currency converter</h1>
        <div class="currency-container">
<select id="currency-first">
    <option value="AUD">AUD</option>
    <option value="CAD">CAD</option>
    <option value="EUR">EUR</option>
    <option value="USD" selected>USD</option>
    <option value="NGN">NGN</option>
    <option value="JPY">JPY</option>
    <option value="GBP">GBP</option>
</select>
<input type="Number" id="worth-first" value="1" min="0">
        </div>
<div class="currency-container">
<select id="currency-second">
    <option value="AUD">AUD</option>
    <option value="CAD">CAD</option>
    <option value="EUR">EUR</option>
    <option value="USD" >USD</option>
    <option value="NGN"selected>NGN</option>
    <option value="JPY">JPY</option>
    <option value="GBP">GBP</option>
</select>
<input type="Number" id="worth-second" value="1" min="0" disabled>
        </div>
<p class="exchange-rate"  id="exchange-rate"> 1 USD=138.5802 JPY</p>
    </div>
    <script src="index.js"></script>
</body>
</html>
